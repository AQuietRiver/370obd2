<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">370 OBD-II system overview</title>
  <desc id="desc">A real vehicle or simulator connects to the shared OBD core, which powers the desktop console and command-line client.</desc>
  <defs>
    <style>
      .label { fill: #f2f3f3; font: 600 17px Inter, "Segoe UI", sans-serif; }
      .detail { fill: #9eabad; font: 14px Inter, "Segoe UI", sans-serif; }
      .eyebrow { fill: #d98a2b; font: 600 12px Inter, "Segoe UI", sans-serif; letter-spacing: 1.5px; }
      .line { fill: none; stroke: #657174; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#657174"/>
    </marker>
  </defs>

  <rect width="1200" height="460" rx="14" fill="#171c1d"/>
  <rect x="1" y="1" width="1198" height="458" rx="13" fill="none" stroke="#3a4547"/>
  <text x="52" y="54" class="eyebrow">SYSTEM OVERVIEW</text>
  <text x="52" y="88" class="label" font-size="25">One diagnostic core, two ways to work</text>

  <path class="line" marker-end="url(#arrow)" d="M280 171H438"/>
  <path class="line" marker-end="url(#arrow)" d="M280 277H438"/>
  <path class="line" marker-end="url(#arrow)" d="M762 171H920"/>
  <path class="line" marker-end="url(#arrow)" d="M762 277H920"/>

  <g>
    <text x="52" y="126" class="eyebrow">INPUT</text>
    <rect x="52" y="140" width="228" height="62" rx="6" fill="#22292a" stroke="#3a4547"/>
    <rect x="52" y="140" width="4" height="62" rx="2" fill="#d98a2b"/>
    <text x="76" y="166" class="label">370Z ECU</text>
    <text x="76" y="187" class="detail">ELM327 over USB serial</text>

    <rect x="52" y="246" width="228" height="62" rx="6" fill="#22292a" stroke="#3a4547"/>
    <text x="76" y="272" class="label">Built-in simulator</text>
    <text x="76" y="293" class="detail">No vehicle required</text>
  </g>

  <g>
    <text x="438" y="126" class="eyebrow">SHARED ENGINE</text>
    <rect x="438" y="140" width="324" height="168" rx="8" fill="#252c2d" stroke="#d98a2b" stroke-width="2"/>
    <text x="470" y="177" class="label" font-size="22">OBD core</text>
    <text x="470" y="208" class="detail">Protocol parsing and PID discovery</text>
    <text x="470" y="236" class="detail">Sensor decoding and DTC operations</text>
    <text x="470" y="264" class="detail">Serial and simulator transports</text>
    <text x="470" y="292" class="detail">Enhanced PID profile support</text>
  </g>

  <g>
    <text x="920" y="126" class="eyebrow">INTERFACES</text>
    <rect x="920" y="140" width="228" height="62" rx="6" fill="#22292a" stroke="#3a4547"/>
    <rect x="1144" y="140" width="4" height="62" rx="2" fill="#d98a2b"/>
    <text x="944" y="166" class="label">Desktop console</text>
    <text x="944" y="187" class="detail">Full diagnostic workspace</text>

    <rect x="920" y="246" width="228" height="62" rx="6" fill="#22292a" stroke="#3a4547"/>
    <text x="944" y="272" class="label">Command-line client</text>
    <text x="944" y="293" class="detail">Fast terminal access</text>
  </g>

  <line x1="52" y1="354" x2="1148" y2="354" stroke="#3a4547"/>
  <text x="52" y="389" class="eyebrow">DESKTOP WORKSPACE</text>
  <text x="52" y="417" class="detail">Live data  ·  Trouble codes  ·  Drive recordings  ·  Service manuals  ·  Technician logbook  ·  Diagnostic assistant</text>
</svg>
